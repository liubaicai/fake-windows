<div class="window classic-window terminal-window" id="terminal-win" data-min-width="560" data-min-height="360" style="top:132px;left:290px;width:760px;height:430px">
  <div class="resize-handle n" data-dir="n"></div>
  <div class="resize-handle s" data-dir="s"></div>
  <div class="resize-handle e" data-dir="e"></div>
  <div class="resize-handle w" data-dir="w"></div>
  <div class="resize-handle ne" data-dir="ne"></div>
  <div class="resize-handle nw" data-dir="nw"></div>
  <div class="resize-handle se" data-dir="se"></div>
  <div class="resize-handle sw" data-dir="sw"></div>

  <div class="window-titlebar classic-titlebar" data-window="terminal-win">
    <div class="window-title-wrap">
      <img class="window-app-icon" src="icons/terminal.png" alt="命令提示符">
      <span class="window-title">C:\\Windows\\system32\\cmd.exe</span>
    </div>
    <div class="window-controls">
      <button class="win-control minimize-btn" data-window="terminal-win" title="最小化"><img src="icons/minimize.png" alt="最小化"></button>
      <button class="win-control maximize-btn" data-window="terminal-win" title="最大化"><img src="icons/maximize.png" alt="最大化"></button>
      <button class="win-control close-btn close" data-window="terminal-win" title="关闭"><img src="icons/close.png" alt="关闭"></button>
    </div>
  </div>

  <div class="terminal-body">
    <pre id="terminal-output"></pre>
    <div class="terminal-input-row">
      <span class="terminal-prompt">C:\Users\baicai&gt;</span>
      <input id="terminal-input" type="text" autocomplete="off" spellcheck="false">
    </div>
  </div>
</div>
