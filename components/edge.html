<!-- ===== Edge 浏览器 ===== -->
<div class="window" id="edge-win" style="top:40px;left:100px;width:950px;height:580px">
  <div class="rh n"></div><div class="rh s"></div><div class="rh e"></div><div class="rh w"></div><div class="rh ne"></div><div class="rh nw"></div><div class="rh se"></div><div class="rh sw"></div>
  <div class="edge-titlebar" data-win="edge-win">
    <div class="edge-tabs">
      <div class="edge-tab active"><img src="icons/microsoft-edge.svg" width="14" height="14"><span>新建标签页</span><div class="edge-tab-close">&times;</div></div>
      <div class="edge-tab-new" title="新建标签页">+</div>
    </div>
    <div class="win-titlebar-btns"><div class="win-btn minimize-btn" data-win="edge-win"><svg viewBox="0 0 10 10"><line x1="0" y1="5" x2="10" y2="5" stroke="#333" stroke-width="1"/></svg></div><div class="win-btn maximize-btn" data-win="edge-win"><svg viewBox="0 0 10 10"><rect x="0.5" y="0.5" width="9" height="9" fill="none" stroke="#333" stroke-width="1"/></svg></div><div class="win-btn close-btn" data-win="edge-win"><svg viewBox="0 0 10 10"><line x1="0" y1="0" x2="10" y2="10" stroke="#333" stroke-width="1.2"/><line x1="10" y1="0" x2="0" y2="10" stroke="#333" stroke-width="1.2"/></svg></div></div>
  </div>
  <div class="edge-toolbar">
    <div class="edge-nav-btns">
      <div class="edge-nav-btn disabled"><svg viewBox="0 0 12 12"><path d="M8 2 L4 6 L8 10" fill="none" stroke="#666" stroke-width="1.5"/></svg></div>
      <div class="edge-nav-btn disabled"><svg viewBox="0 0 12 12"><path d="M4 2 L8 6 L4 10" fill="none" stroke="#666" stroke-width="1.5"/></svg></div>
      <div class="edge-nav-btn"><svg viewBox="0 0 12 12"><path d="M10 6 A4 4 0 1 1 6 2" fill="none" stroke="#333" stroke-width="1.3"/><path d="M8 2 L6 2 L6 4" fill="none" stroke="#333" stroke-width="1.3"/></svg></div>
    </div>
    <div class="edge-address-bar">
      <svg viewBox="0 0 16 16" width="14" height="14" style="flex-shrink:0;margin-right:6px"><path d="M8 1 L4 5 L4 15 L12 15 L12 5 Z" fill="none" stroke="#0078d4" stroke-width="1.2"/><path d="M6 9 L8 11 L10 7" fill="none" stroke="#0078d4" stroke-width="1.2" stroke-linecap="round"/></svg>
      <span class="edge-url">edge://newtab</span>
    </div>
    <div class="edge-toolbar-btns">
      <div class="edge-tool-btn" title="收藏夹"><svg viewBox="0 0 16 16"><path d="M8 2 L9.5 5.5 L13.5 6 L10.5 8.5 L11.5 12.5 L8 10.5 L4.5 12.5 L5.5 8.5 L2.5 6 L6.5 5.5 Z" fill="none" stroke="#333" stroke-width="1.2"/></svg></div>
      <div class="edge-tool-btn" title="集锦"><svg viewBox="0 0 16 16"><rect x="3" y="2" width="10" height="12" rx="1" fill="none" stroke="#333" stroke-width="1.2"/><path d="M6 5 L10 5 M6 7.5 L10 7.5 M6 10 L9 10" stroke="#333" stroke-width="1"/></svg></div>
      <div class="edge-tool-btn" title="设置及其他"><svg viewBox="0 0 16 16"><circle cx="8" cy="3" r="1.2" fill="#333"/><circle cx="8" cy="8" r="1.2" fill="#333"/><circle cx="8" cy="13" r="1.2" fill="#333"/></svg></div>
    </div>
  </div>
  <div class="edge-content">
    <div class="edge-ntp">
      <div class="edge-ntp-logo"><img src="icons/microsoft-edge.svg" width="48" height="48"></div>
      <div class="edge-search-box">
        <svg viewBox="0 0 20 20" width="18" height="18"><circle cx="8" cy="8" r="6" fill="none" stroke="#999" stroke-width="1.5"/><line x1="12" y1="12" x2="17" y2="17" stroke="#999" stroke-width="1.5" stroke-linecap="round"/></svg>
        <input type="text" placeholder="搜索 Web" class="edge-search-input" readonly>
      </div>
      <div class="edge-quick-links">
        <div class="edge-quick-link">
          <div class="edge-ql-icon" style="background:#F25022"><svg viewBox="0 0 20 20"><rect x="2" y="2" width="7" height="7" fill="#fff"/><rect x="11" y="2" width="7" height="7" fill="#fff"/><rect x="2" y="11" width="7" height="7" fill="#fff"/><rect x="11" y="11" width="7" height="7" fill="#fff"/></svg></div>
          <span>Microsoft</span>
        </div>
        <div class="edge-quick-link">
          <div class="edge-ql-icon" style="background:#0078d4"><svg viewBox="0 0 20 20"><rect x="3" y="5" width="14" height="10" rx="1" fill="none" stroke="#fff" stroke-width="1.2"/><path d="M3 5 L10 11 L17 5" fill="none" stroke="#fff" stroke-width="1.2"/></svg></div>
          <span>Outlook</span>
        </div>
        <div class="edge-quick-link">
          <div class="edge-ql-icon" style="background:#217346"><svg viewBox="0 0 20 20"><rect x="3" y="3" width="14" height="14" rx="1" fill="none" stroke="#fff" stroke-width="1.2"/><path d="M6 7 L10 7 L10 13 M6 10 L10 10" stroke="#fff" stroke-width="1.2"/></svg></div>
          <span>Office</span>
        </div>
        <div class="edge-quick-link">
          <div class="edge-ql-icon" style="background:#333"><svg viewBox="0 0 20 20"><path d="M4 14 C4 8 8 4 10 4 C12 4 16 8 16 14" fill="none" stroke="#fff" stroke-width="1.2"/><circle cx="10" cy="14" r="1.5" fill="#fff"/></svg></div>
          <span>GitHub</span>
        </div>
        <div class="edge-quick-link">
          <div class="edge-ql-icon" style="background:#EA4335"><svg viewBox="0 0 20 20"><circle cx="10" cy="10" r="6" fill="none" stroke="#fff" stroke-width="1.5"/><path d="M10 4 L10 10 L14 10" fill="none" stroke="#fff" stroke-width="1.2"/></svg></div>
          <span>Google</span>
        </div>
        <div class="edge-quick-link">
          <div class="edge-ql-icon" style="background:#00B2FF"><svg viewBox="0 0 20 20"><path d="M5 14 L10 6 L15 14" fill="none" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
          <span>Bing</span>
        </div>
      </div>
      <div class="edge-news-section">
        <div class="edge-news-header">我的资讯</div>
        <div class="edge-news-grid">
          <div class="edge-news-card">
            <div class="edge-news-img" style="background:linear-gradient(135deg,#667eea,#764ba2)"></div>
            <div class="edge-news-title">科技前沿：AI 技术在 2026 年的最新突破</div>
            <div class="edge-news-source">科技日报 · 2小时前</div>
          </div>
          <div class="edge-news-card">
            <div class="edge-news-img" style="background:linear-gradient(135deg,#f093fb,#f5576c)"></div>
            <div class="edge-news-title">全球经济展望：第二季度增长预期上调</div>
            <div class="edge-news-source">财经网 · 3小时前</div>
          </div>
          <div class="edge-news-card">
            <div class="edge-news-img" style="background:linear-gradient(135deg,#4facfe,#00f2fe)"></div>
            <div class="edge-news-title">春季出游好去处：国内十大赏花目的地推荐</div>
            <div class="edge-news-source">旅游指南 · 5小时前</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
